<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Pet</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>🐱 My Virtual Pet</h1>
  
    <div id="customize">
    <input type="text" id="catName" placeholder="Enter cat name">

    <select id="catType">
      <option value="🐱">Normal Cat</option>
      <option value="🐈">Orange Cat</option>
      <option value="🐈‍⬛">Black Cat</option>
    </select>

    <button id="saveCat">Save</button>
  </div>

  <div id="pet">
    <p id="petMood">😊 Happy</p>
  </div>

  <p>Happiness: <span id="happiness">5</span></p>

  <button id="feedBtn">Feed 🍖</button>
  <button id="playBtn">Play 🎾</button>

  <script src="index.js"></script>
</body>
</html>
